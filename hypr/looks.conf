source = ~/.cache/wal/colors-hyprland.conf

general {
    gaps_in = 4
    gaps_out = 5

    border_size = 3

    col.active_border = $active_border
    col.inactive_border = $active_border
    
    resize_on_border = true
    allow_tearing = true
    layout = dwindle

}

decoration {
   rounding = 10
   rounding_power = 4

   active_opacity = 0.70
   inactive_opacity = 0.70

   shadow {
        enabled = true
        range = 10
        render_power = 3
        color = $active_border
    }
   blur {
       enabled = true
       size = 8
       passes = 3
       noise = 0.0
       ignore_opacity = true
       brightness = 0.8
       vibrancy = 0.2
       xray = true
   }
}
